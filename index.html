<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#003594" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WJ Ulm" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png" />

  <title>WJ Ulm / Neu-Ulm</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;700&family=Bitter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* WJD Corporate Colors */
      --blue:    #003594;
      --teal:    #47D7AC;
      --red:     #F9423A;
      --yellow:  #FFB81C;
      --gray:    #A2AAAD;
      --white:   #FFFFFF;

      /* UI */
      --bg:      #F2F5FA;
      --card:    #FFFFFF;
      --text:    #0D1B2A;
      --muted:   #5A6A80;
      --border:  rgba(0,53,148,0.1);
      --blue-10: rgba(0,53,148,0.07);
      --teal-15: rgba(71,215,172,0.15);

      --r:       16px;
      --r-sm:    11px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; overflow: hidden; background: var(--blue); }
    body {
      font-family: 'Bitter', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex; flex-direction: column;
      height: 100vh; height: 100dvh;
      background: var(--bg);
    }

    /* ── HEADER ── */
    #header {
      background: var(--blue);
      padding: calc(var(--safe-top) + 12px) 18px 12px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    /* teal accent line at bottom of header */
    #header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: var(--teal);
    }

    #logo-svg { height: 28px; width: auto; flex-shrink: 0; }
    #hdr-sep  { width: 1px; height: 22px; background: rgba(255,255,255,0.2); }
    #hdr-right { flex: 1; }
    #hdr-title {
      color: #fff;
      font-family: 'Chivo', sans-serif;
      font-size: 14px; font-weight: 700; line-height: 1;
      letter-spacing: 0.1px;
    }
    #hdr-sub { color: var(--teal); font-family: 'Bitter', serif; font-size: 10px; margin-top: 3px; letter-spacing: 0.3px; }

    /* ── SCROLL ── */
    #scroll {
      flex: 1; overflow-y: auto;
      padding: 18px 16px calc(var(--safe-bot) + 24px);
    }

    /* ── SECTION LABEL ── */
    .slabel {
      font-family: 'Chivo', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--blue);
      margin: 20px 0 9px 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .slabel::after {
      content: ''; flex: 1; height: 2px;
      background: var(--teal); border-radius: 1px;
    }

    /* ── 2-COL GRID ── */
    .grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 4px;
    }

    .tile {
      background: var(--card);
      border-radius: var(--r-sm);
      padding: 15px 14px 13px;
      border: 1.5px solid var(--border);
      cursor: pointer; text-align: left;
      display: flex; flex-direction: column; gap: 10px;
      transition: transform 0.1s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      position: relative; overflow: hidden;
    }
    /* teal top-border accent */
    .tile::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: var(--teal);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.2s;
    }
    .tile:active { transform: scale(0.95); }
    .tile:active::before { transform: scaleX(1); }

    .tile-icon {
      width: 38px; height: 38px; border-radius: 9px;
      background: var(--teal-15);
      display: flex; align-items: center; justify-content: center;
    }
    .tile-icon svg { width: 19px; height: 19px; }

    .tile-label {
      font-family: 'Chivo', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--text);
      line-height: 1.3;
    }
    .tile-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── LIST ── */
    .lcard {
      background: var(--card);
      border-radius: var(--r-sm);
      border: 1.5px solid var(--border);
      overflow: hidden;
    }

    .lrow {
      display: flex; align-items: center; gap: 11px;
      padding: 12px 14px;
      border: none; background: none;
      border-bottom: 1px solid var(--border);
      cursor: pointer; width: 100%; text-align: left;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .lrow:last-child { border-bottom: none; }
    .lrow:active { background: var(--teal-15); }

    .licon {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--teal-15);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .licon svg { width: 16px; height: 16px; }
    /* red accent for external */
    .licon.ext { background: rgba(249,66,58,0.1); }

    .ltext { flex: 1; }
    .ltext b {
      display: block;
      font-family: 'Chivo', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--text);
    }
    .ltext span { font-size: 11px; color: var(--muted); }

    .lbadge {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
      background: rgba(249,66,58,0.1); color: var(--red);
      padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
    }

    .lchev { opacity: 0.35; }
    .lchev svg { width: 13px; height: 13px; display: block; }

    /* ── FOOTER TAG ── */
    .footer-tag {
      text-align: center;
      font-size: 10px; color: var(--gray);
      margin-top: 20px; padding-bottom: 4px;
      letter-spacing: 0.3px;
    }
    .footer-tag span {
      color: var(--teal);
      font-weight: 700;
    }
  </style>
</head>
